appId: com.advisorarmor.desktop
productName: AdvisorArmor
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
directories:
  output: release
files:
  - out/**
  - assets/**
  - '!assets/.DS_Store'
  - '!assets/Thumbs.db'
  - package.json
asar: true
mac:
  icon: assets/icon.icns
  category: public.app-category.utilities
  identity: null
  extraResources:
    - from: native/macos/wifi-active/dist/wifi-active
      to: native/macos/wifi-active/wifi-active
    - from: native/macos/wifi-known/dist/wifi-known
      to: native/macos/wifi-known/wifi-known
  target:
    - dmg
    - zip
win:
  icon: assets/icon.ico
  target:
    - nsis
publish:
  provider: github
