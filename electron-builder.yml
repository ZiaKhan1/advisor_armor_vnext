appId: com.advisorarmor.desktop
productName: AdvisorArmor
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
directories:
  output: release
files:
  - out/**
  - assets/**
  - '!assets/.DS_Store'
  - package.json
asar: true
mac:
  icon: assets/icon.icns
  category: public.app-category.utilities
  identity: null
  target:
    - dmg
    - zip
win:
  icon: assets/icon.ico
  target:
    - nsis
publish:
  provider: github
